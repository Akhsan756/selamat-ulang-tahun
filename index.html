<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk ISTRIKU💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
  color: white;
  overflow: hidden;
}

h1 {
  margin-top: 40px;
  font-size: 2.2em;
}

#name {
  font-size: 2.5em;
  color: #ff9ae6;
  text-shadow: 0 0 10px #ff9ae6;
  margin-top: 10px;
}

#slider {
  width: 220px;
  height: 220px;
  margin: 20px auto;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

#slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#message {
  margin-top: 20px;
  font-size: 20px;
  opacity: 0;
  transition: opacity 2s;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #ff9ae6;
  color: black;
  margin-top: 20px;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>

</head>

<body>

<h1>🎁 Ada sesuatu untuk ISTRIKU...</h1>
<button onclick="start()">Buka 💖</button>

<div id="name"></div>

<div id="slider">
  <img id="slide" src="foto1.jpg">
</div>

<div id="message">
  🎉 Selamat Ulang Tahun 🎉<br><br>
  Semoga semua impianmu tercapai,<br>
  selalu bahagia, dan tetap jadi kamu yang luar biasa 💖
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<canvas id="confetti"></canvas>

<script>
// typing effect
const text = "Untuk ISTRIKU 💖";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("name").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 80);
  }
}

// slider foto
const images = ["foto1.jpg", "foto2.jpg", "foto3.jpg"];
let index = 0;

function startSlider() {
  setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slide").src = images[index];
  }, 2000);
}

// start semua
function start() {
  typeWriter();
  startSlider();
  document.getElementById("message").style.opacity = 1;
  document.getElementById("music").play();
  startConfetti();
}

// confetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];
for (let i = 0; i < 150; i++) {
  pieces.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 5 + 2,
    speed: Math.random() * 3 + 1
  });
}

function startConfetti() {
  function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pieces.forEach(p => {
      p.y += p.speed;
      if (p.y > canvas.height) p.y = 0;

      ctx.fillStyle = "#fff";
      ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    requestAnimationFrame(update);
  }
  update();
}
</script>

</body>
</html>
