<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOR ISTRIKU 💖</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  text-align: center;
}

/* opening */
#start {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: black;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: pink;
  cursor: pointer;
}

/* main */
#content {
  display: none;
  padding: 20px;
}

.bubble {
  background: rgba(255,255,255,0.1);
  margin: 10px auto;
  padding: 10px 15px;
  border-radius: 15px;
  width: fit-content;
  max-width: 80%;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.5s;
}

/* foto */
#photo {
  width: 220px;
  border-radius: 15px;
  margin-top: 20px;
  opacity: 0;
  transition: opacity 2s;
}

/* ending */
#final {
  margin-top: 20px;
  display: none;
}

#final h1 {
  color: pink;
  text-shadow: 0 0 10px pink;
}
</style>

</head>

<body>

<div id="start">
  <h2>aku ada sesuatu buat kamu...</h2>
  <button onclick="start()">klik pelan ya 💔</button>
</div>

<div id="content">
  <div id="chat"></div>
  <img id="photo" src="foto1.jpg">

  <div id="final">
    <button onclick="reveal()">klik ini 💖</button>
    <h1 id="love" style="display:none;">aku sayang kamu ❤️</h1>
  </div>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>
const messages = [
  "aku ga tau harus mulai dari mana",
  "tapi aku pengen kamu baca ini sampai akhir ya",
  "semoga kita menua bersama",
  "kadang aku mikir wanita didunia ini banyak, tapi tidak semua bisa kuat seperti kamu",
  "gimana ya kalau aku ga ketemu kamu waktu itu?",
  "mungkin aku tidak bisa hidup lebih lama",
  "mungkin semuanya bakal beda",
  "karena sebagian hidupku ada di kamu",
  "aku masih inget hal-hal kecil tentang kamu",
  "cara kamu ketawa",
  "cara kamu cerita",
  "kamu yang terbaik buat aku",
  "dan tanpa sadar",
  "kamu jadi bagian penting di hidup aku",
  "tidak akan pernah tergantikan oleh siapapun",
  "hari ini hari kamu",
  "dan ini kado spesial buat kamu",
  "selamat ulang tahun ya 💖",
  "semoga panjang umur dan makin dewasa",
  "makasih sudah ada, jangan pernah meninggalkan aku",
  "sealau menemai aku, susah maupun senang",
  "aku ga selalu bilang kamu harus selalu memenuhi keinginanku",
  "tapi kamu selalu ada disisiku dan buat kita bahagia berama selamanya.",
];

let i = 0;

function showChat() {
  if (i < messages.length) {
    const div = document.createElement("div");
    div.className = "bubble";
    div.innerText = messages[i];

    document.getElementById("chat").appendChild(div);

    setTimeout(() => {
      div.style.opacity = 1;
      div.style.transform = "translateY(0)";
    }, 100);

    // vibrate di HP
    if (navigator.vibrate) {
      navigator.vibrate(50);
    }

    // munculin foto di tengah
    if (i === 10) {
      document.getElementById("photo").style.opacity = 1;
    }

    i++;
    setTimeout(showChat, 1800);
  } else {
    document.getElementById("final").style.display = "block";
  }
}

function start() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "block";

  document.getElementById("music").play();

  showChat();
}

function reveal() {
  document.getElementById("love").style.display = "block";
  if (navigator.vibrate) {
    navigator.vibrate([100, 50, 100]);
  }
}
</script>

</body>
</html>
