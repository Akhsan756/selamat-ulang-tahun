<!DOCTYPE html>

<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 50px;
      font-size: 2.5em;
    }

    #name {
      font-size: 2em;
      font-weight: bold;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 1s;
    }

    #photo {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      margin-top: 20px;
      object-fit: cover;
      opacity: 0;
      transform: scale(0.5);
      transition: all 1s;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: black;
      margin-top: 20px;
    }

    #message {
      margin-top: 20px;
      font-size: 20px;
      opacity: 0;
      transition: opacity 1.5s;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>

</head>
<body>

  <h1>🎂 Ada Kejutan Untuk Kamu...</h1>
  <button onclick="startSurprise()">Klik di sini 🎁</button>

  <div id="name">Untuk: [ISTRIKU]</div>

  <img id="photo" src="foto.jpg" alt="foto">

  <div id="message">
    🎉 Selamat Ulang Tahun! 🎉<br><br>
    Semoga hari-harimu selalu penuh kebahagiaan,<br>
    sehat selalu, dan semua impianmu tercapai 💖
  </div>

<canvas id="confetti"></canvas>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

  <script>
    function startSurprise() {
      document.getElementById("name").style.opacity = 1;

      const photo = document.getElementById("photo");
      photo.style.opacity = 1;
      photo.style.transform = "scale(1)";

      document.getElementById("message").style.opacity = 1;
      document.getElementById("music").play();

      startConfetti();
    }

    // confetti
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];

    for (let i = 0; i < 120; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 6 + 2,
        speed: Math.random() * 3 + 1
      });
    }

    function startConfetti() {
      function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        pieces.forEach(p => {
          p.y += p.speed;
          if (p.y > canvas.height) p.y = 0;

          ctx.fillStyle = "white";
          ctx.fillRect(p.x, p.y, p.size, p.size);
        });

        requestAnimationFrame(update);
      }
      update();
    }
  </script>

</body>
</html>
