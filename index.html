<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk ISTRIKU 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #2b2b45, #1a1a2e);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* opening */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: pink;
}

/* main */
#content {
  display: none;
}

#name {
  font-size: 2.5em;
  margin-top: 30px;
  color: #ff9ae6;
  text-shadow: 0 0 10px #ff9ae6;
}

/* chat */
#chat {
  margin-top: 20px;
}

.bubble {
  background: rgba(255,255,255,0.1);
  margin: 10px auto;
  padding: 10px 15px;
  border-radius: 15px;
  width: fit-content;
  max-width: 80%;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.5s;
}

/* slider */
#slider {
  margin-top: 20px;
}

#slider img {
  width: 200px;
  height: 200px;
  border-radius: 15px;
  object-fit: cover;
  box-shadow: 0 0 15px rgba(255,255,255,0.3);
}
</style>

</head>

<body>

<div id="startScreen">
  <h1>💌 Ada sesuatu untuk ISTRIKU...</h1>
  <button onclick="start()">Buka 💖</button>
</div>

<div id="content">
  <div id="name">Untuk ISTRIKU 💖</div>

  <div id="chat"></div>

  <div id="slider">
    <img id="slide" src="foto1.jpg">
  </div>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
// pesan chat
const messages = [
  "Hai kamu 😊",
  "Hari ini hari spesial ya...",
  "Aku cuma mau bilang...",
  "Makasih sudah hadir di hidupku 💖",
  "Semoga kamu selalu bahagia",
  "Dan semoga aku bisa terus ada di sampingmu ❤️",
  "Selamat ulang tahun ya 🎉"
];

let index = 0;

function showMessage() {
  if (index < messages.length) {
    const div = document.createElement("div");
    div.className = "bubble";
    div.innerText = messages[index];
    document.getElementById("chat").appendChild(div);

    setTimeout(() => {
      div.style.opacity = 1;
      div.style.transform = "translateY(0)";
    }, 100);

    index++;
    setTimeout(showMessage, 1500);
  }
}

// slider foto
const images = ["foto1.jpg","foto2.jpg","foto3.jpg"];
let i = 0;

function slider() {
  setInterval(() => {
    i = (i + 1) % images.length;
    document.getElementById("slide").src = images[i];
  }, 2500);
}

// start
function start() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("content").style.display = "block";

  document.getElementById("music").play();

  showMessage();
  slider();
}
</script>

</body>
</html>
